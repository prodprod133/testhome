<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цветочный магазин</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #faf7f8; color: #333; padding-bottom: 80px; }
    header { background: #e84a7f; color: #fff; padding: 16px; text-align: center; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card img { width: 100%; height: 130px; object-fit: cover; }
    .card .info { padding: 8px; }
    .card .name { font-size: 14px; margin-bottom: 4px; }
    .card .price { font-weight: bold; color: #e84a7f; margin-bottom: 6px; }
    .card button { width: 100%; padding: 8px; border: none; background: #e84a7f; color: #fff; border-radius: 8px; font-size: 14px; }
    .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px; box-shadow: 0 -2px 10px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; }
    .cart-bar button { background: #2ecc71; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 15px; }
  </style>
</head>
<body>
  <header>🌸 Цветочный магазин</header>

  <div class="grid" id="grid"></div>

  <div class="cart-bar">
    <div>Корзина: <b id="total">0</b> ₽</div>
    <button onclick="order()">Оформить заказ</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const products = [
      { id: 1, name: "Букет роз", price: 2500, img: "https://images.unsplash.com/photo-1561181286-d3fee7d55364?w=400" },
      { id: 2, name: "Тюльпаны 25 шт", price: 1800, img: "https://images.unsplash.com/photo-1520763185298-1b434c919102?w=400" },
      { id: 3, name: "Пионы", price: 3200, img: "https://images.unsplash.com/photo-1591886960571-74d43a9d4166?w=400" },
      { id: 4, name: "Композиция в коробке", price: 4000, img: "https://images.unsplash.com/photo-1457089328109-e5d9bd499191?w=400" }
    ];

    let cart = {};

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      products.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <img src="${p.img}">
            <div class="info">
              <div class="name">${p.name}</div>
              <div class="price">${p.price} ₽</div>
              <button onclick="add(${p.id})">В корзину ${cart[p.id] ? '('+cart[p.id]+')' : ''}</button>
            </div>
          </div>`;
      });
    }

    function add(id) {
      cart[id] = (cart[id] || 0) + 1;
      updateTotal();
      render();
    }

    function updateTotal() {
      let total = 0;
      for (let id in cart) {
        const p = products.find(x => x.id == id);
        total += p.price * cart[id];
      }
      document.getElementById('total').innerText = total;
    }

    function order() {
  // 1) Сразу показываем, что вообще видит Telegram
  tg.showAlert(
    "Платформа: " + tg.platform +
    "\nВерсия: " + tg.version +
    "\ninitData: " + (tg.initData ? "ЕСТЬ" : "НЕТ") +
    "\nТоваров в корзине: " + Object.keys(cart).length
  );

  if (Object.keys(cart).length === 0) {
    tg.showAlert("Корзина пуста! Сначала добавь товар.");
    return;
  }

  let items = [];
  for (let id in cart) {
    const p = products.find(x => x.id == id);
    items.push({ name: p.name, qty: cart[id], price: p.price });
  }

  // в index.html функция order() должна слать ИМЕННО так:
const payload = JSON.stringify({
  items: [
    { name: "Букет роз", qty: 1, price: 2500 }
  ]
});

tg.sendData(payload);

  // 2) Показываем что именно отправляем
  tg.showAlert("Отправляю: " + payload);

  try {
    tg.sendData(payload);
    // НЕ закрываем сразу, чтобы успеть увидеть результат
    tg.showAlert("sendData выполнен! Закрываю окно.");
    tg.close();
  } catch (e) {
    tg.showAlert("ОШИБКА sendData: " + e);
  }
}

    render();
  </script>
</body>
</html>
