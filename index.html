<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Территория красоты 🌸</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --gold: #c9a227;
    --gold-light: #e6c66b;
    --dark: #1a1410;
    --dark2: #241c15;
    --cream: #f6f1e7;
    --text: #efe9dd;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 100%);
    color: var(--text);
    padding: 0 0 120px 0;
    min-height: 100vh;
  }

  /* Шапка */
  .header {
    text-align: center;
    padding: 36px 20px 28px;
    background: linear-gradient(180deg, rgba(201,162,39,0.12), transparent);
    border-bottom: 1px solid rgba(201,162,39,0.25);
  }
  .header h1 {
    font-size: 30px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: var(--gold-light);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* Товары */
  .products {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 22px 16px;
  }
  .card {
    background: linear-gradient(155deg, #2c2118, #1f1812);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 18px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    transition: transform .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card:active { transform: scale(0.97); }
  .card .emoji { font-size: 46px; margin-bottom: 10px; }
  .card .name { font-size: 16px; margin-bottom: 6px; color: var(--cream); }
  .card .price { font-size: 17px; color: var(--gold-light); margin-bottom: 12px; font-weight: bold; }

  .btn-add {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    padding: 9px 16px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: .5px;
  }

  /* Счётчик в карточке */
  .counter { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .counter button {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-light);
    font-size: 18px; cursor: pointer;
  }
  .counter span { font-size: 16px; min-width: 20px; }

  /* Корзина-плашка снизу */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(26,20,16,0.95), var(--dark));
    border-top: 1px solid rgba(201,162,39,0.4);
    padding: 16px 18px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(8px);
    transform: translateY(120%);
    transition: transform .3s;
  }
  .cart-bar.show { transform: translateY(0); }
  .cart-bar .total { font-size: 17px; color: var(--gold-light); }
  .cart-bar .total small { display:block; font-size: 11px; color: var(--text); opacity:.7; }
  .btn-order {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none; padding: 14px 26px;
    border-radius: 30px; font-size: 15px;
    font-weight: bold; cursor: pointer;
    letter-spacing: 1px;
  }

  /* Модальное окно формы */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; align-items: flex-end;
    z-index: 50;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: linear-gradient(160deg, #2c2118, #1a1410);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 26px 22px 30px;
    border-top: 2px solid var(--gold);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-content h2 {
    text-align: center; color: var(--gold-light);
    margin-bottom: 20px; font-size: 22px; letter-spacing: 1px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display:block; font-size: 13px; color: var(--gold-light);
    margin-bottom: 6px; letter-spacing: .5px;
  }
  .field input {
    width: 100%;
    padding: 13px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--gold); }

  .order-summary {
    background: rgba(201,162,39,0.08);
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: 12px;
    padding: 14px; margin-bottom: 18px;
    font-size: 14px; line-height: 1.7;
  }
  .order-summary .sum-total {
    border-top: 1px solid rgba(201,162,39,0.3);
    margin-top: 8px; padding-top: 8px;
    color: var(--gold-light); font-weight: bold; font-size: 16px;
  }

  .btn-confirm {
    width: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    color: var(--dark); border: none;
    padding: 16px; border-radius: 14px;
    font-size: 16px; font-weight: bold;
    cursor: pointer; letter-spacing: 1px;
  }
  .btn-close {
    width: 100%; background: transparent;
    color: var(--text); border: none;
    padding: 12px; margin-top: 10px;
    font-size: 14px; cursor: pointer; opacity:.7;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Территория красоты</h1>
    <p>Цветы премиум-класса</p>
  </div>

  <div class="products" id="products"></div>

  <!-- Плашка корзины -->
  <div class="cart-bar" id="cartBar">
    <div class="total">
      <span id="cartTotal">0 ₽</span>
      <small id="cartCount">0 товаров</small>
    </div>
    <button class="btn-order" onclick="openModal()">Оформить</button>
  </div>

  <!-- Модальное окно с формой -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Оформление заказа</h2>

      <div class="order-summary" id="orderSummary"></div>

      <div class="field">
        <label>Ваше имя</label>
        <input type="text" id="name" placeholder="Например, Анна">
      </div>
      <div class="field">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
      </div>
      <div class="field">
        <label>Адрес доставки</label>
        <input type="text" id="address" placeholder="Город, улица, дом, квартира">
      </div>

      <button class="btn-confirm" onclick="sendOrder()">Подтвердить заказ</button>
      <button class="btn-close" onclick="closeModal()">Отмена</button>
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  // Каталог товаров
  const products = [
    { id: 1, name: "Букет роз",        price: 2500, emoji: "🌹" },
    { id: 2, name: "Пионы нежные",     price: 3200, emoji: "🌸" },
    { id: 3, name: "Тюльпаны",         price: 1800, emoji: "🌷" },
    { id: 4, name: "Орхидея в кашпо",  price: 4500, emoji: "🪴" },
    { id: 5, name: "Букет полевой",    price: 2100, emoji: "💐" },
    { id: 6, name: "Лилии белые",      price: 2800, emoji: "🌼" },
  ];

  let cart = {}; // { id: qty }

  // Рендер карточек
  function renderProducts() {
    const box = document.getElementById("products");
    box.innerHTML = "";
    products.forEach(p => {
      const qty = cart[p.id] || 0;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="emoji">${p.emoji}</div>
        <div class="name">${p.name}</div>
        <div class="price">${p.price} ₽</div>
        ${qty === 0
          ? `<button class="btn-add" onclick="addItem(${p.id})">В корзину</button>`
          : `<div class="counter">
               <button onclick="changeQty(${p.id},-1)">−</button>
               <span>${qty}</span>
               <button onclick="changeQty(${p.id},1)">+</button>
             </div>`}
      `;
      box.appendChild(card);
    });
  }

  function addItem(id) { cart[id] = 1; update(); }
  function changeQty(id, d) {
    cart[id] = (cart[id] || 0) + d;
    if (cart[id] <= 0) delete cart[id];
    update();
  }

  function update() {
    renderProducts();
    const bar = document.getElementById("cartBar");
    let total = 0, count = 0;
    for (let id in cart) {
      const p = products.find(x => x.id == id);
      total += p.price * cart[id];
      count += cart[id];
    }
    document.getElementById("cartTotal").textContent = total + " ₽";
    document.getElementById("cartCount").textContent = count + " товаров";
    bar.classList.toggle("show", count > 0);
  }

  // Открыть модалку с итогом заказа
  function openModal() {
    const summary = document.getElementById("orderSummary");
    let html = "", total = 0;
    for (let id in cart) {
      const p = products.find(x => x.id == id);
      const sum = p.price * cart[id];
      total += sum;
      html += `${p.emoji} ${p.name} × ${cart[id]} — ${sum} ₽<br>`;
    }
    html += `<div class="sum-total">Итого: ${total} ₽</div>`;
    summary.innerHTML = html;
    document.getElementById("modal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("show");
  }

  // Отправка заказа боту
  function sendOrder() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();

    if (!name || !phone || !address) {
      tg.showAlert("Пожалуйста, заполните имя, телефон и адрес.");
      return;
    }

    let items = [], total = 0;
    for (let id in cart) {
      const p = products.find(x => String(x.id) === String(id));
      if (!p) continue;
      items.push({ name: p.name, qty: cart[id], price: p.price });
      total += p.price * cart[id];
    }

    const data = {
      customer: { name, phone, address },
      items: items,
      total: total
    };

    tg.sendData(JSON.stringify(data));
    tg.close();
  }

  renderProducts();
</script>
</body>
</html>
